name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  rust:
    name: Rust Tests & Lint
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/parakatt-core

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -p parakatt-core -- -D warnings

      - name: Run tests
        run: cargo test -p parakatt-core

  swift:
    name: Swift Lint
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Check Swift formatting
        run: swiftformat --lint Parakatt/
