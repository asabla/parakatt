name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/parakatt-core

      - name: Install build tools
        run: |
          brew install xcodegen create-dmg
          cargo install cargo-swift

      - name: Build Rust core
        run: make rust

      - name: Generate Swift package
        run: make swift-package

      - name: Generate Xcode project
        run: make xcode

      - name: Build Release
        run: make release

      # TODO: Add Developer ID signing and notarization for proper Homebrew distribution.
      # Without this, the binary is ad-hoc signed and macOS restricts text insertion APIs.
