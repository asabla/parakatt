name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/parakatt-core

      - name: Install build tools
        run: |
          brew install xcodegen create-dmg
          cargo install cargo-swift

      - name: Build Rust core
        run: make rust

      - name: Generate Swift package
        run: make swift-package

      - name: Generate Xcode project
        run: make xcode

      - name: Build Release
        run: make release

      - name: Get build products path
        id: build-path
        run: |
          BUILD_DIR=$(xcodebuild -project Parakatt.xcodeproj -scheme Parakatt -configuration Release -showBuildSettings 2>/dev/null | grep ' BUILT_PRODUCTS_DIR' | awk '{print $NF}')
          echo "dir=$BUILD_DIR" >> "$GITHUB_OUTPUT"

      - name: Build stable launcher
        run: |
          # Build the stable launcher from source on CI so it matches the
          # runner's toolchain. The launcher binary is tiny (Launcher/main.swift)
          # and its CDHash must be consistent across releases.
          make launcher

      - name: Swap in stable launcher
        run: |
          # Replace the Xcode-compiled launcher with the stable binary.
          # The stable launcher's CDHash never changes between releases, so
          # macOS TCC permissions (Accessibility, Microphone, Screen Recording)
          # persist across updates.
          cp bin/parakatt-launcher "${{ steps.build-path.outputs.dir }}/Parakatt.app/Contents/MacOS/Parakatt"

      - name: Verify stable launcher CDHash
        run: |
          EXPECTED_CDHASH=$(codesign -dvvv bin/parakatt-launcher 2>&1 | grep '^CDHash=' | cut -d= -f2)
          ACTUAL_CDHASH=$(codesign -dvvv "${{ steps.build-path.outputs.dir }}/Parakatt.app/Contents/MacOS/Parakatt" 2>&1 | grep '^CDHash=' | cut -d= -f2)
          echo "Expected CDHash: $EXPECTED_CDHASH"
          echo "Actual CDHash:   $ACTUAL_CDHASH"
          if [ "$EXPECTED_CDHASH" != "$ACTUAL_CDHASH" ]; then
            echo "::error::CDHash mismatch! TCC permissions will reset for users."
            exit 1
          fi
          echo "CDHash matches — TCC permissions will persist across updates."

      # TODO: Add Developer ID signing and notarization when an Apple Developer
      # Program membership is available. This would replace the self-signed
      # approach and allow Gatekeeper to pass the app without xattr workarounds.

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create zip
        run: |
          mkdir -p dist
          ditto -c -k --keepParent "${{ steps.build-path.outputs.dir }}/Parakatt.app" "dist/Parakatt-${{ steps.version.outputs.version }}-arm64.zip"

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Parakatt" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Parakatt.app" 175 190 \
            --hide-extension "Parakatt.app" \
            --app-drop-link 425 190 \
            "dist/Parakatt-${{ steps.version.outputs.version }}-arm64.dmg" \
            "${{ steps.build-path.outputs.dir }}/Parakatt.app"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/Parakatt-${{ steps.version.outputs.version }}-arm64.zip
            dist/Parakatt-${{ steps.version.outputs.version }}-arm64.dmg

