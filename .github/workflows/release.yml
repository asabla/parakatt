      #     xcodebuild -project Parakatt.xcodeproj -scheme Parakatt -configuration Release \
      #       CODE_SIGN_STYLE=Manual \
      #       CODE_SIGN_IDENTITY="Developer ID Application" \
      #       DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
      #       build
      #
      # - name: Notarize app
      #   run: |
      #     ditto -c -k --keepParent "$BUILD_DIR/Parakatt.app" /tmp/Parakatt-notarize.zip
      #     xcrun notarytool submit /tmp/Parakatt-notarize.zip \
      #       --apple-id "${{ secrets.APPLE_ID }}" \
      #       --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
      #       --team-id "${{ secrets.APPLE_TEAM_ID }}" \
      #       --wait
      #     xcrun stapler staple "$BUILD_DIR/Parakatt.app"

      - name: Get build products path
        id: build-path
        run: |
          BUILD_DIR=$(xcodebuild -project Parakatt.xcodeproj -scheme Parakatt -configuration Release -showBuildSettings 2>/dev/null | grep ' BUILT_PRODUCTS_DIR' | awk '{print $NF}')
          echo "dir=$BUILD_DIR" >> "$GITHUB_OUTPUT"

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create zip
        run: |
          mkdir -p dist
          ditto -c -k --keepParent "${{ steps.build-path.outputs.dir }}/Parakatt.app" "dist/Parakatt-${{ steps.version.outputs.version }}-arm64.zip"

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Parakatt" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Parakatt.app" 175 190 \
            --hide-extension "Parakatt.app" \
            --app-drop-link 425 190 \
            "dist/Parakatt-${{ steps.version.outputs.version }}-arm64.dmg" \
            "${{ steps.build-path.outputs.dir }}/Parakatt.app"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/Parakatt-${{ steps.version.outputs.version }}-arm64.zip
            dist/Parakatt-${{ steps.version.outputs.version }}-arm64.dmg

