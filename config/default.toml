# Parakatt default configuration
# The actual config is stored in ~/Library/Application Support/Parakatt/config/config.toml

[general]
active_mode = "dictation"
auto_paste = true
show_overlay = true

[stt]
active_model = "parakeet-tdt-0.6b-v3"

[llm]
# Uncomment and configure one of the following providers:
# active_provider = "ollama"
# active_provider = "lmstudio"
# active_provider = "openai"

[llm.ollama]
base_url = "http://localhost:11434"
model = "llama3.2"

[llm.lmstudio]
base_url = "http://localhost:1234"

[llm.openai]
# api_key = "sk-..."
# model = "gpt-4o-mini"

[llm.anthropic]
# api_key = "sk-ant-..."
# model = "claude-sonnet-4-5-20250514"

