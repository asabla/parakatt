<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <!-- Background (macOS applies squircle mask) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Cat, scaled and centered -->
  <g transform="translate(512, 488) scale(19) translate(-22, -24)">
    <!-- Body outline filled -->
    <path d="M10 33 Q9 39 22 39 Q35 39 34 33 L34 22 Q34 17 31 14 Q29 9 26 13 Q24 16 22 16 Q20 16 18 13 Q15 9 13 14 Q10 17 10 22 Z"
          fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.92)" stroke-width="1.6" stroke-linejoin="round"/>
    <!-- Ear details -->
    <path d="M13 14 Q14.5 16 17 15" fill="none" stroke="rgba(255,255,255,0.30)" stroke-width="1.0" stroke-linecap="round"/>
    <path d="M31 14 Q29.5 16 27 15" fill="none" stroke="rgba(255,255,255,0.30)" stroke-width="1.0" stroke-linecap="round"/>
    <!-- Eyes -->
    <path d="M14 24.5 Q16.5 22 19 24.5" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M25 24.5 Q27.5 22 30 24.5" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Nose -->
    <path d="M20.5 28.5 L22 26.5 L23.5 28.5 Z" fill="rgba(255,255,255,0.50)"/>
  </g>
</svg>
